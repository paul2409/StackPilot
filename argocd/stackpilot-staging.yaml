apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stackpilot-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/paul2409/stackpilot.git
    targetRevision: main
    path: helm/stackpilot
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: stackpilot-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
