apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-identity-exporter
  namespace: monitoring
  labels:
    app: postgres-identity-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-identity-exporter
  template:
    metadata:
      labels:
        app: postgres-identity-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_SOURCE_URI
              value: "postgres-identity.__APP_NS__.svc.cluster.local:5432/__IDENTITY_DB_NAME__?sslmode=disable"
            - name: DATA_SOURCE_USER
              value: "__IDENTITY_DB_USER__"
            - name: DATA_SOURCE_PASS
              value: "__IDENTITY_DB_PASS__"
          ports:
            - name: metrics
              containerPort: 9187
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-identity-exporter
  namespace: monitoring
  labels:
    app: postgres-identity-exporter
spec:
  selector:
    app: postgres-identity-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
      protocol: TCP
