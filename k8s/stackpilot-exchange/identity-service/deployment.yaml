apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: ghcr.io/paul2409/identity-service:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: SERVICE_NAME
              value: identity-service
            - name: SERVICE_VERSION
              value: "1.0.0"
            - name: ENV
              value: dev
            - name: PORT
              value: "8000"
            - name: POSTGRES_HOST
              value: postgres-identity
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: identity_db
            - name: POSTGRES_USER
              value: identity_user
            - name: POSTGRES_PASSWORD
              value: identity_pass
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10