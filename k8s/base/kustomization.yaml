apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: stackpilot

resources:
  - namespace.yaml
  - db.yaml
  - api.yaml
  - api-service.yaml

secretGenerator:
  - name: postgres-secret
    envs:
      - postgres.secret.env
  - name: api-db-secret
    envs:
      - api-db.secret.env

generatorOptions:
  disableNameSuffixHash: true