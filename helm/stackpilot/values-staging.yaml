global:
  environment: staging
  domainSuffix: local

customerPortal:
  replicaCount: 2
  ingressHost: customer-staging.local

adminPortal:
  replicaCount: 1
  ingressHost: admin-staging.local

opsPortal:
  replicaCount: 1
  ingressHost: ops-staging.local

identityService:
  replicaCount: 1

walletService:
  replicaCount: 1

systemService:
  replicaCount: 1

resources:
  default:
    requests:
      cpu: "150m"
      memory: "192Mi"
    limits:
      cpu: "400m"
      memory: "384Mi"

labels:
  environment: staging