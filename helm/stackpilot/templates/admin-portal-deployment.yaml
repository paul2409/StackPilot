apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-portal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackpilot.commonLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.adminPortal.replicaCount }}
  selector:
    matchLabels:
      app: admin-portal
      stackpilot.io/environment: {{ .Values.global.environment }}
  template:
    metadata:
      labels:
        app: admin-portal
        {{- include "stackpilot.commonLabels" . | nindent 8 }}
    spec:
      containers:
        - name: admin-portal
          image: "{{ .Values.adminPortal.image.repository }}:{{ .Values.adminPortal.image.tag }}"
          imagePullPolicy: {{ .Values.adminPortal.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.adminPortal.service.port }}
          env:
            - name: ENV
              value: {{ .Values.global.environment | quote }}
            - name: IDENTITY_SERVICE_URL
              value: "http://identity-service:{{ .Values.identityService.service.port }}"
            - name: WALLET_SERVICE_URL
              value: "http://wallet-service:{{ .Values.walletService.service.port }}"
            - name: SYSTEM_SERVICE_URL
              value: "http://system-service:{{ .Values.systemService.service.port }}"
          readinessProbe:
            httpGet:
              path: {{ .Values.adminPortal.probes.readinessPath }}
              port: {{ .Values.adminPortal.service.port }}
          livenessProbe:
            httpGet:
              path: {{ .Values.adminPortal.probes.livenessPath }}
              port: {{ .Values.adminPortal.service.port }}
          resources:
            requests:
              cpu: {{ .Values.resources.default.requests.cpu }}
              memory: {{ .Values.resources.default.requests.memory }}
            limits:
              cpu: {{ .Values.resources.default.limits.cpu }}
              memory: {{ .Values.resources.default.limits.memory }}