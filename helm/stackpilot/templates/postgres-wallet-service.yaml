apiVersion: v1
kind: Service
metadata:
  name: postgres-wallet
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackpilot.commonLabels" . | nindent 4 }}
spec:
  selector:
    app: postgres-wallet
    stackpilot.io/environment: {{ .Values.global.environment }}
  ports:
    - port: {{ .Values.postgresWallet.service.port }}
      targetPort: {{ .Values.postgresWallet.service.port }}
      protocol: TCP
  type: ClusterIP