apiVersion: v1
kind: Service
metadata:
  name: admin-portal
  namespace: {{ .Release.Namespace }}
  labels:
    app: admin-portal
    {{- include "stackpilot.commonLabels" . | nindent 4 }}
spec:
  selector:
    app: admin-portal
    stackpilot.io/environment: {{ .Values.global.environment }}
  ports:
    - port: {{ .Values.adminPortal.service.port }}
      targetPort: {{ .Values.adminPortal.service.port }}
      protocol: TCP
  type: ClusterIP
