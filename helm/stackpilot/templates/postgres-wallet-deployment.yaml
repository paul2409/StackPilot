apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-wallet
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackpilot.commonLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.postgresWallet.replicaCount }}
  selector:
    matchLabels:
      app: postgres-wallet
      stackpilot.io/environment: {{ .Values.global.environment }}
  template:
    metadata:
      labels:
        app: postgres-wallet
        {{- include "stackpilot.commonLabels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres-wallet
          image: "{{ .Values.postgresWallet.image.repository }}:{{ .Values.postgresWallet.image.tag }}"
          imagePullPolicy: {{ .Values.postgresWallet.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.postgresWallet.service.port }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresWallet.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresWallet.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresWallet.auth.password | quote }}
          resources:
            requests:
              cpu: {{ .Values.resources.default.requests.cpu }}
              memory: {{ .Values.resources.default.requests.memory }}
            limits:
              cpu: {{ .Values.resources.default.limits.cpu }}
              memory: {{ .Values.resources.default.limits.memory }}