apiVersion: v1
kind: Service
metadata:
  name: system-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: system-service
    {{- include "stackpilot.commonLabels" . | nindent 4 }}
spec:
  selector:
    app: system-service
    stackpilot.io/environment: {{ .Values.global.environment }}
  ports:
    - port: {{ .Values.systemService.service.port }}
      targetPort: {{ .Values.systemService.service.port }}
      protocol: TCP
  type: ClusterIP
