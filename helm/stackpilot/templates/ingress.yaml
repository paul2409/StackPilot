apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stackpilot-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackpilot.commonLabels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.global.ingressClassName }}
  rules:
    - host: {{ .Values.customerPortal.ingressHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: customer-portal
                port:
                  number: {{ .Values.customerPortal.service.port }}
    - host: {{ .Values.adminPortal.ingressHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-portal
                port:
                  number: {{ .Values.adminPortal.service.port }}
    - host: {{ .Values.opsPortal.ingressHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ops-portal
                port:
                  number: {{ .Values.opsPortal.service.port }}
