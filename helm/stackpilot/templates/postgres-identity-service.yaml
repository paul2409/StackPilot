apiVersion: v1
kind: Service
metadata:
  name: postgres-identity
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackpilot.commonLabels" . | nindent 4 }}
spec:
  selector:
    app: postgres-identity
    stackpilot.io/environment: {{ .Values.global.environment }}
  ports:
    - port: {{ .Values.postgresIdentity.service.port }}
      targetPort: {{ .Values.postgresIdentity.service.port }}
      protocol: TCP
  type: ClusterIP