name: stackpilot-delivery

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stackpilot-delivery-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate (Repo Gates)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform (pin 1.5.x)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0
          terraform_wrapper: false

      - name: Repo checks
        shell: bash
        run: |
          set -euo pipefail
          make checks

  deliver:
    name: Deliver (AWS Lifecycle Proof)
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 45

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq curl openssh-client

      - name: Setup Terraform (pin 1.5.x)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0
          terraform_wrapper: false

      # Single entrypoint. Makefile + orchestrator handle everything:
      # keygen -> run.tfvars -> plan/apply -> target.env -> deploy -> verify -> destroy -> clean-check (trap)
      - name: Run deterministic lifecycle (Makefile entrypoint)
        shell: bash
        run: |
          set -euo pipefail
          make aws-cycle

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stackpilot-delivery-artifacts
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: Remove private key before artifact upload (always)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f artifacts/aws/stackpilot_ci_key || true
