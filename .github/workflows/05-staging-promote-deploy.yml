name: Staging Promote Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: staging-promote
  cancel-in-progress: false

jobs:
  promote-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Promote dev tags into staging
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          import yaml
          from pathlib import Path

          dev_path = Path("helm/stackpilot/values-dev.yaml")
          staging_path = Path("helm/stackpilot/values-staging.yaml")

          with dev_path.open() as f:
              dev = yaml.safe_load(f)

          with staging_path.open() as f:
              staging = yaml.safe_load(f)

          mapping = {
              "identityService": ("identity-service", "ghcr.io/paul2409/identity-service"),
              "walletService": ("wallet-service", "ghcr.io/paul2409/wallet-service"),
              "systemService": ("system-service", "ghcr.io/paul2409/system-service"),
              "customerPortal": ("customer-portal", "ghcr.io/paul2409/customer-portal"),
              "adminPortal": ("admin-portal", "ghcr.io/paul2409/admin-portal"),
              "opsPortal": ("ops-portal", "ghcr.io/paul2409/ops-portal"),
          }

          release_entries = {}

          for values_key, (release_key, repo) in mapping.items():
              dev_tag = dev.get(values_key, {}).get("image", {}).get("tag")
              if not dev_tag:
                  continue

              staging.setdefault(values_key, {})
              staging[values_key].setdefault("image", {})
              staging[values_key]["image"]["repository"] = repo
              staging[values_key]["image"]["tag"] = dev_tag

              release_entries[release_key] = f"{repo}:{dev_tag}"

          with staging_path.open("w") as f:
              yaml.safe_dump(staging, f, sort_keys=False)

          release_path = Path("artifacts/releases")
          release_path.mkdir(parents=True, exist_ok=True)
          current_staging = release_path / "current-staging.txt"

          lines = [
              f"identity-service={release_entries['identity-service']}",
              f"wallet-service={release_entries['wallet-service']}",
              f"system-service={release_entries['system-service']}",
              f"customer-portal={release_entries['customer-portal']}",
              f"admin-portal={release_entries['admin-portal']}",
              f"ops-portal={release_entries['ops-portal']}",
          ]

          current_staging.write_text("\n".join(lines) + "\n")
          PY

      - name: Commit staging promotion state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add helm/stackpilot/values-staging.yaml artifacts/releases/current-staging.txt

          git commit -m "chore: promote dev -> staging [skip ci]" || echo "No changes"
          git push